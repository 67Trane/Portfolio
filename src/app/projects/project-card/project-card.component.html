<div id="project-card" (click)="toggleModal()" class="fixed inset-0 z-[98] bg-black/70 backdrop-blur-sm">
    <section  (click)="$event.stopPropagation()"
        class="fixed flex flex-col md:flex-row top-5 left-5 right-5 bottom-5 rounded-3xl bg-hero bg-cover bg-no-repeat z-50 border-primary border overflow-hidden animate-[modalIn_0.25s_ease-out_forwards]">

        <!-- Close Button -->
        <div class="absolute top-0 right-0 z-10">
            <svg (click)="toggleModal()"
                class="size-10 m-4 cursor-pointer hover:text-primary hover:scale-150 origin-center transition-transform duration-300"
                xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                <path d="M6 18L18 6M6 6l12 12" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
            </svg>
        </div>

        <!-- Next Project -->
        <div (click)="nextProject()" class="absolute bottom-4 right-6 flex items-center gap-3 z-10 cursor-pointer group
       bg-black/60 hover:bg-black/80 border border-primary/60 
       text-white rounded-full px-5 py-2 transition-all duration-300 select-none">
            <span class="text-base">Next project</span>
            <svg class="transition-transform duration-300 group-hover:translate-x-1 text-primary"
                xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="18" height="18" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="5" y1="12" x2="19" y2="12"></line>
                <polyline points="12 5 19 12 12 19"></polyline>
            </svg>
        </div>
        <!-- LEFT: Text Content -->
        <div class="flex flex-col justify-center p-10 md:w-1/2 overflow-y-auto pb-16
                    [&::-webkit-scrollbar]:w-1 [&::-webkit-scrollbar-track]:transparent
                    [&::-webkit-scrollbar-thumb]:bg-primary/40 [&::-webkit-scrollbar-thumb]:rounded-full">

            <h1 class="text-2xl text-primary font-bold md:text-5xl mb-1">
                {{ (projectIndex + 1) | number:'2.0' }}
            </h1>
            <h2 class="text-2xl font-bold font-fira md:text-4xl">{{projects[projectIndex].name}}</h2>
            <h3 class="text-base text-primary font-fira pt-5 pb-3 md:text-2xl">{{ 'PROJECTCARD.TITLE' | translate}}</h3>
            <p class="pb-5 text-sm md:text-base leading-relaxed">{{projects[projectIndex].description | translate}}</p>

            <div class="flex gap-3 pb-7 flex-wrap">
                <div *ngFor="let tool of matchingIcons"
                    class="flex items-center gap-2 bg-white/10 rounded-full px-3 py-1 border border-white/10">
                    <img class="size-4 filter-primary" src="assets/icons/skillset-icons/{{tool.file}}" alt="">
                    <span class="text-sm">{{tool.name}}</span>
                </div>
            </div>

            <div class="flex gap-4">
                <button (click)="openGithub()"
                    class="rounded-full border-white border px-6 py-3 flex gap-2 items-center overHover hover:text-primary hover:border-primary text-sm">
                    Github <img src="assets/icons/arrow_outward_primary.svg" alt="">
                </button>
                <button (click)="navigateToProject()"
                    class="rounded-full border-white border px-6 py-3 flex gap-2 items-center overHover hover:text-primary hover:border-primary text-sm">
                    Live Test <img src="assets/icons/arrow_outward_primary.svg" alt="">
                </button>
            </div>
        </div>

        <!-- RIGHT: Image -->
        <div class="md:w-1/2 flex justify-center items-center p-8 md:p-10">
            <img class="rounded-2xl object-contain w-full max-h-[40vh] shadow-2xl"
                src="{{projects[projectIndex].picture}}" alt="">
        </div>
    </section>
</div>
